appId: com.quantumlawgroup.app
productName: Quantum Law Group
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
win:
  target:
    - nsis
  # No spaces in the artifact name: GitHub rewrites spaces to dots on upload, which then
  # mismatches the hyphenated name electron-updater writes into latest.yml and breaks the
  # auto-update download. A literal hyphenated name stays identical end to end.
  artifactName: Quantum-Law-Group-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
publish:
  provider: github
  owner: noobling
  repo: quantumlawgroup
